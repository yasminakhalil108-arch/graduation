button.primary {background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 14px 30px; border: none; border-radius: 10px; cursor: pointer; font-size: 1.05em; font-weight: 600; width: 100%; transition: all 0.3s; margin-top: 15px;}
button.primary:hover {transform: scale(1.02); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);}

button.disorder-btn {background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px; border: none; border-radius: 12px; cursor: pointer; margin: 8px; font-size: 1em; font-weight: 600; transition: all 0.3s; display: inline-block;}
button.disorder-btn:hover {transform: scale(1.05); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);}

input:focus, select:focus {outline: none; border-color: #667eea;}

.symptom-list, .disorder-grid {display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin: 15px 0;}
.symptom-item, .disorder-card {background: #f8f9fa; padding: 15px; border-radius: 12px; border: 2px solid #e0e0e0; cursor: pointer; transition: all 0.3s;}
.symptom-item:hover, .disorder-card:hover {background: #667eea; color: white; border-color: #667eea; transform: translateY(-5px);}
.symptom-item.selected, .disorder-card.selected {background: #667eea; color: white; border-color: #667eea;}

.checkbox {margin-right: 10px;}
.rating-scale {display: flex; gap: 10px; margin: 15px 0; align-items: center;}
.rating-btn {padding: 10px 15px; border: 2px solid #ddd; background: white; border-radius: 8px; cursor: pointer; transition: all 0.3s; font-weight: 600;}
.rating-btn:hover {border-color: #667eea; color: #667eea;}
.rating-btn.selected {background: #667eea; color: white; border-color: #667eea;}

.result-box {background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 15px; text-align: center; margin: 20px 0;}
.result-box h2 {font-size: 2em; margin-bottom: 15px;}
.result-box p {font-size: 1.1em; margin: 10px 0;}

.disorder-details {background: #f8f9fa; padding: 20px; border-radius: 12px; margin: 15px 0; border-right: 5px solid #667eea;}
.disorder-details h3 {color: #667eea; margin-top: 15px; margin-bottom: 10px; font-size: 1.3em;}
.disorder-details ul {margin-right: 20px; margin: 10px 0;}
.disorder-details li {margin: 8px 0; line-height: 1.8;}

.back-btn {background: #999; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 15px; font-weight: 600;}
.back-btn:hover {background: #666;}

h1, h2, h3 {color: #667eea;}

// الإجابة على السؤال
function answerQuestion(questionIndex, answer) {
  assessmentAnswers[questionIndex] = answer;
  
  // تحديث الزر المختار
  let scale = assessmentScales[currentAssessment];
  let maxVal = scale.name.includes('النوم') ? 4 : 3;
  let startVal = scale.name.includes('النوم') ? 1 : 0;
  
  for (let i = startVal; i <= maxVal; i++) {
    let btn = document.getElementById(`q${questionIndex}-a${i}`);
    if (btn) {
      if (i === answer) {
        btn.classList.add('selected');
      } else {
        btn.classList.remove('selected');
      }
    }
  }
  
  // تحديث رسالة الحالة
  let answerText = document.getElementById(`answer-${questionIndex}`);
  if (answerText) {
    answerText.innerText = `✓ اخترت: ${answer}`;
  }
}

// تقديم المقياس وحساب النتيجة
function submitAssessment(disorderKey) {
  let scale = assessmentScales[currentAssessment];
  
  // التحقق من أن جميع الأسئلة تمت الإجابة عليها
  if (Object.keys(assessmentAnswers).length < scale.questions.length) {
    alert('يرجى الإجابة على جميع الأسئلة قبل المتابعة');
    return;
  }
  
  // حساب الدرجة
  let totalScore = Object.values(assessmentAnswers).reduce((a, b) => parseInt(a) + parseInt(b), 0);
  
  // تحديد التفسير
  let interpretation = 'غير محدد';
  let severity = '';
  
  if (scale.name.includes('النوم')) {
    if (totalScore <= 30) interpretation = 'طبيعي';
    else if (totalScore <= 45) interpretation = 'بسيط';
    else if (totalScore <= 60) interpretation = 'متوسط';
    else interpretation = 'شديد';
  } else {
    if (totalScore <= 15) interpretation = 'طبيعي';
    else if (totalScore <= 30) interpretation = 'متوسط';
    else interpretation = 'مرتفع';
  }
  
  showAssessmentResult(disorderKey, scale, totalScore, interpretation);
}

  symptoms.forEach(s => {

  });
  
  html += `</div>

  </button>`;

// اختيار الأعراض
function toggleSymptom(el, symptom) {
  el.classList.toggle('selected');
  if (el.classList.contains('selected')) {
    selectedSymptoms.push(symptom);
  } else {
    selectedSymptoms = selectedSymptoms.filter(s => s !== symptom);
  }
}

// صفحة التقييم
function showSymptomRating() {
  if (selectedSymptoms.length === 0) {
    alert('اختر عرضاً واحداً على الأقل لمتابعة التقييم');
    return;
  }
  
  symptomRatings = {};
  let html = `
    <button class='back-btn' onclick="showSymptomDiagnosis()">← رجوع</button>
    <div class='card'>
      <h2>📊 قيّم شدة كل عرض</h2>
      <p style="color:#666; margin:15px 0;">قيّم من 1 (خفيف) إلى 5 (شديد جداً):</p>
  `;
  
  selectedSymptoms.forEach(s => {
    html += `
      <div style="background:#f8f9fa; padding:15px; border-radius:10px; margin:15px 0;">
        <p style="font-weight:600; margin-bottom:10px;">${s}</p>
        <div class='rating-scale'>
          ${[1,2,3,4,5].map(i => `<button class='rating-btn' onclick="rateSymptom('${s}', ${i})">${i}</button>`).join('')}
        </div>
        <small id='rating-${s}' style="color:#999;">لم تختر</small>
      </div>
    `;
  });
  
  html += `
    <button class='primary' onclick="showDiagnosisResult()" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
      📋 عرض النتيجة
    </button>
  `;
  document.getElementById('content').innerHTML = html;
}

// تقييم العرض
function rateSymptom(symptom, rating) {
  symptomRatings[symptom] = rating;
  document.getElementById(`rating-${symptom}`).innerText = `✓ درجة: ${rating} / 5`;
  document.querySelectorAll(`[onclick*="rateSymptom('${symptom}"]`).forEach(btn => btn.classList.remove('selected'));
  event.target.classList.add('selected');
}

// نتيجة التشخيص
function showDiagnosisResult() {
  let totalRating = Object.values(symptomRatings).reduce((a, b) => a + b, 0);
  let avgRating = (totalRating / selectedSymptoms.length).toFixed(1);
  
  let diagnosis = '';
  let color = '';
  
  if (avgRating < 2) {
    diagnosis = '✅ حالتك جيدة نسبياً';
    color = '#28a745';
  } else if (avgRating < 3) {
    diagnosis = '⚠️ قد تحتاج إلى بعض الانتباه';
    color = '#ffc107';
  } else if (avgRating < 4) {
    diagnosis = '🔴 تحتاج إلى متابعة طبية';
    color = '#fd7e14';
  } else {
    diagnosis = '🚨 يجب استشارة متخصص فوراً';
    color = '#dc3545';
  }
  
  // محاولة تحديد الاضطراب
  let matchedDisorder = '';
  for (let key in disorders) {
    let disorderSymptoms = disorders[key].symptoms;
    let matches = selectedSymptoms.filter(s => disorderSymptoms.includes(s)).length;
    if (matches > 0) {
      matchedDisorder = key;
      break;
    }
  }
  
  let html = `
    <button class='back-btn' onclick="showSymptomRating()">← رجوع</button>
    <div class='result-box' style="background: linear-gradient(135deg, ${color} 0%, rgba(0,0,0,0.1) 100%);">
      <h2>${diagnosis}</h2>
      <p>متوسط الشدة: <strong>${avgRating} / 5</strong></p>
    </div>
    
    <div class='card'>
      <h3>📋 ملخص التقييم</h3>
      <p><strong>الأعراض المختارة:</strong></p>
      <ul>
        ${selectedSymptoms.map(s => `<li>• ${s} (${symptomRatings[s]}/5)</li>`).join('')}
      </ul>
  `;
  
  if (matchedDisorder) {
    html += `
    <div style="background:#e7f3ff; padding:20px; border-radius:10px; margin-top:20px;">
      <p style="color:#004085;"><strong>💡 قد تكون بحاجة إلى معرفة أكثر عن:</strong></p>
      <button class='primary' onclick="showDisorderDetails('${matchedDisorder}')" style="margin-top:10px;">
        اعرف المزيد عن ${disorders[matchedDisorder].name}
      </button>
    </div>
    `;
  }
  
  html += `
  <p style="background:#fff3cd; padding:15px; border-radius:10px; margin-top:20px; color:#856404;">
    <strong>⚠️ هام:</strong> هذا التشخيص بسيط وتعليمي فقط. استشر متخصصاً نفسياً للحصول على تشخيص دقيق.
  </p>
  </div>`;
  document.getElementById('content').innerHTML = html;
}
