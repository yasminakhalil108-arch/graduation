<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="تسجيل الدخول - Sign It">
    <meta name="theme-color" content="#6366F1">
    <title>تسجيل الدخول - Sign It</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0e7ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 3rem 2rem;
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .login-brand-icon {
            font-size: 2.5rem;
            color: #7C3AED;
        }

        .login-brand-text {
            font-size: 1.8rem;
            font-weight: bold;
            color: #1e293b;
        }

        .login-title {
            font-size: 1.8rem;
            color: #1e293b;
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: #64748b;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            color: #1e293b;
            font-weight: 600;
            margin-bottom: 0.6rem;
            font-size: 0.95rem;
        }

        .form-input {
            width: 100%;
            padding: 0.9rem 1.1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: #7C3AED;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
            background: #fafaf9;
        }

        .form-input::placeholder {
            color: #94a3b8;
        }

        .login-btn {
            width: 100%;
            padding: 0.95rem 1.5rem;
            background: linear-gradient(135deg, #7C3AED, #2563EB);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
            margin-bottom: 1rem;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(124, 58, 237, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .form-divider {
            text-align: center;
            color: #94a3b8;
            margin: 1.5rem 0;
            font-size: 0.9rem;
        }

        .signup-link {
            text-align: center;
            color: #64748b;
            font-size: 0.95rem;
        }

        .signup-link a {
            color: #7C3AED;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .signup-link a:hover {
            color: #2563EB;
        }

        .error-message {
            background: #FEE2E2;
            color: #B91C1C;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: none;
            border-right: 4px solid #B91C1C;
        }

        .error-message.show {
            display: block;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .success-message {
            background: #DCFCE7;
            color: #15803D;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: none;
            border-right: 4px solid #15803D;
        }

        .success-message.show {
            display: block;
            animation: slideUp 0.3s ease;
        }

        .form-loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .login-container {
                padding: 2rem 1.5rem;
            }

            .login-title {
                font-size: 1.5rem;
            }

            .login-brand-text {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- رأس تسجيل الدخول -->
        <div class="login-header">
            <div class="login-brand">
                <span class="login-brand-icon"><i class="fas fa-hands"></i></span>
                <span class="login-brand-text">Sign It</span>
            </div>
            <h1 class="login-title">تسجيل الدخول</h1>
            <p class="login-subtitle">أدخل بيانات حسابك للمتابعة</p>
        </div>

        <!-- رسائل الخطأ والنجاح -->
        <div id="errorMessage" class="error-message">
            <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
        </div>
        <div id="successMessage" class="success-message">
            <i class="fas fa-check-circle"></i> <span id="successText"></span>
        </div>

        <!-- نموذج تسجيل الدخول -->
        <form id="loginForm" action="https://formspree.io/f/xeevrbdg" method="POST">
            <!-- حقل البريد الإلكتروني -->
            <div class="form-group">
                <label class="form-label">البريد الإلكتروني</label>
                <input 
                    type="email" 
                    name="email" 
                    id="email"
                    class="form-input" 
                    placeholder="أدخل بريدك الإلكتروني" 
                    required
                    autocomplete="email"
                >
            </div>

            <!-- حقل كلمة المرور -->
            <div class="form-group">
                <label class="form-label">كلمة المرور</label>
                <input 
                    type="password" 
                    name="password" 
                    id="password"
                    class="form-input" 
                    placeholder="أدخل كلمة المرور" 
                    required
                    autocomplete="current-password"
                >
            </div>

            <!-- حقل مخفي لنوع النموذج -->
            <input type="hidden" name="form_type" value="login">

            <!-- زر تسجيل الدخول -->
            <button type="submit" id="loginBtn" class="login-btn">
                <span id="btnText">تسجيل الدخول</span>
            </button>
        </form>

        <!-- فاصل -->
        <div class="form-divider">أو</div>

        <!-- رابط إنشاء حساب جديد -->
        <div class="signup-link">
            ليس لديك حساب؟ 
            <a href="signup.html">إنشاء حساب جديد</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successMessage = document.getElementById('successMessage');
        const successText = document.getElementById('successText');

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            // إخفاء الرسائل السابقة
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');

            // الحصول على البيانات
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // التحقق من الصحة
            if (!email || !password) {
                showError('يرجى ملء جميع الحقول');
                return;
            }

            if (!isValidEmail(email)) {
                showError('يرجى إدخال بريد إلكتروني صحيح');
                return;
            }

            if (password.length < 6) {
                showError('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                return;
            }

            // تعطيل الزر وإظهار المؤشر
            loginBtn.disabled = true;
            btnText.innerHTML = '<span class="form-loading"></span>جاري تسجيل الدخول...';

            try {
                // إرسال البيانات إلى Formspree
                const response = await fetch('https://formspree.io/f/xeevrbdg', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        form_type: 'login',
                        timestamp: new Date().toISOString()
                    })
                });

                if (response.ok) {
                    // حفظ بيانات المستخدم في localStorage
                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('isAuthenticated', 'true');
                    localStorage.setItem('loginTime', new Date().toISOString());

                    // إظهار رسالة النجاح
                    successText.textContent = 'تم تسجيل الدخول بنجاح! جاري التحويل...';
                    successMessage.classList.add('show');

                    // التحويل إلى الصفحة الرئيسية بعد 1.5 ثانية
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    throw new Error('فشل التحقق من البيانات');
                }
            } catch (error) {
                showError('حدث خطأ أثناء تسجيل الدخول. يرجى المحاولة مرة أخرى');
                console.error('Error:', error);
                
                // إعادة تفعيل الزر
                loginBtn.disabled = false;
                btnText.innerHTML = 'تسجيل الدخول';
            }
        });

        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('show');
            loginBtn.disabled = false;
            btnText.innerHTML = 'تسجيل الدخول';
        }

        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // مسح الأخطاء عند الكتابة
        document.getElementById('email').addEventListener('focus', () => {
            errorMessage.classList.remove('show');
        });

        document.getElementById('password').addEventListener('focus', () => {
            errorMessage.classList.remove('show');
        });
    </script>
</body>
</html>
