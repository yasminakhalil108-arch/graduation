<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة تحكم ساين إيت - إضافة كلمات جديدة</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 30px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    h1 { color: #5e35b1; margin-bottom: 10px; }
    .sub { color: #666; margin-bottom: 30px; }
    input, textarea, select {
      width: 100%;
      padding: 12px 15px;
      margin: 10px 0;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 16px;
    }
    input:focus, textarea:focus { border-color: #5e35b1; outline: none; }
    button {
      background: linear-gradient(135deg, #5e35b1, #3949ab);
      color: white;
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
      width: 100%;
    }
    button:hover { transform: translateY(-2px); }
    .preview {
      margin-top: 20px;
      padding: 20px;
      background: #f5f5f5;
      border-radius: 15px;
      text-align: center;
    }
    .preview img { max-width: 100px; margin-top: 10px; }
    .info { background: #e3f2fd; padding: 15px; border-radius: 12px; margin: 20px 0; }
    .success { background: #d4edda; color: #155724; padding: 12px; border-radius: 10px; margin-top: 15px; display: none; }
    .error { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 10px; margin-top: 15px; display: none; }
    .word-list {
      max-height: 300px;
      overflow-y: auto;
      margin-top: 20px;
      border-top: 2px solid #eee;
      padding-top: 15px;
    }
    .word-item {
      display: inline-block;
      background: #f0f0f0;
      padding: 5px 12px;
      margin: 5px;
      border-radius: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🤟 ساين إيت - لوحة التحكم</h1>
  <p class="sub">أضف كلمات وإشارات جديدة بسهولة</p>
  
  <div class="info">
    💡 <strong>كيف تستخدم:</strong><br>
    1️⃣ اكتب الكلمة بالعربية<br>
    2️⃣ اكتب وصف أو اتركه فارغاً<br>
    3️⃣ اختر فئة الكلمة<br>
    4️⃣ الصق رابط الصورة أو اسم الملف (مثال: images/كلمة.png)<br>
    5️⃣ اضغط "إضافة كلمة" - سيتم حفظها تلقائياً!
  </div>

  <input type="text" id="newWord" placeholder="✏️ الكلمة الجديدة (مثال: سيارة)">
  <textarea id="wordDesc" rows="2" placeholder="📝 وصف أو ملاحظات (اختياري)"></textarea>
  <select id="wordCategory">
    <option value="عام">📚 عام</option>
    <option value="تحيات">👋 تحيات</option>
    <option value="طعام">🍔 طعام</option>
    <option value="حيوانات">🐱 حيوانات</option>
    <option value="منزل">🏠 منزل</option>
    <option value="مشاعر">😊 مشاعر</option>
    <option value="ألوان">🎨 ألوان</option>
    <option value="أرقام">🔢 أرقام</option>
  </select>
  <input type="text" id="wordImage" placeholder="🖼️ رابط الصورة أو اسم الملف (مثال: images/سيارة.png)">
  
  <button onclick="addNewWord()">➕ إضافة كلمة جديدة</button>
  
  <div id="successMsg" class="success"></div>
  <div id="errorMsg" class="error"></div>
  
  <div class="preview" id="previewArea" style="display:none;">
    <strong>📸 معاينة الصورة:</strong><br>
    <img id="previewImg" src="">
  </div>

  <div class="word-list">
    <strong>📖 الكلمات الموجودة حالياً:</strong><br>
    <div id="existingWords"></div>
  </div>
</div>

<script>
  // تحميل الكلمات الموجودة
  let currentDictionary = { words: {} };

  async function loadWords() {
    try {
      const response = await fetch('words-db.json');
      if (response.ok) {
        currentDictionary = await response.json();
      }
    } catch(e) {
      console.log("ملف الكلمات غير موجود، سيتم إنشاؤه عند الإضافة");
    }
    displayWordList();
  }

  function displayWordList() {
    const container = document.getElementById('existingWords');
    const words = Object.keys(currentDictionary.words || {});
    if (words.length === 0) {
      container.innerHTML = '<span style="color:#999;">لا توجد كلمات بعد، أضف كلمتك الأولى!</span>';
      return;
    }
    container.innerHTML = words.map(w => `<span class="word-item">${w}</span>`).join('');
  }

  // معاينة الصورة
  document.getElementById('wordImage').addEventListener('input', function() {
    const imgUrl = this.value;
    const previewDiv = document.getElementById('previewArea');
    const previewImg = document.getElementById('previewImg');
    if (imgUrl) {
      previewDiv.style.display = 'block';
      previewImg.src = imgUrl;
      previewImg.onerror = () => { previewImg.src = 'https://cdn-icons-png.flaticon.com/512/1077/1077063.png'; };
    } else {
      previewDiv.style.display = 'none';
    }
  });

  async function addNewWord() {
    const word = document.getElementById('newWord').value.trim();
    const image = document.getElementById('wordImage').value.trim();
    const category = document.getElementById('wordCategory').value;
    const desc = document.getElementById('wordDesc').value.trim();
    
    if (!word) {
      showError('❌ الرجاء إدخال الكلمة');
      return;
    }
    if (!image) {
      showError('❌ الرجاء إدخال رابط الصورة أو اسم الملف');
      return;
    }

    // التحقق من عدم التكرار
    if (currentDictionary.words && currentDictionary.words[word]) {
      showError(`⚠️ الكلمة "${word}" موجودة بالفعل!`);
      return;
    }

    // إضافة الكلمة الجديدة
    const newEntry = {
      word: word,
      img: image,
      category: category,
      desc: desc,
      addedBy: "user",
      date: new Date().toISOString().split('T')[0]
    };

    if (!currentDictionary.words) currentDictionary.words = {};
    currentDictionary.words[word] = newEntry;
    currentDictionary.lastUpdated = new Date().toISOString();

    // حفظ الملف
    try {
      const jsonString = JSON.stringify(currentDictionary, null, 2);
      // تحميل الملف للمستخدم
      downloadJSON(jsonString, 'words-db.json');
      showSuccess(`✅ تمت إضافة "${word}" بنجاح! تم تحميل ملف words-db.json الجديد.`);
      
      // إظهار تعليمات للمستخدم
      setTimeout(() => {
        showSuccess(`📁 ضع ملف words-db.json الجديد في نفس مجلد الموقع الرئيسي، ثم أعد تحميل الصفحة الرئيسية!`, 5000);
      }, 2000);
      
      // تنظيف الحقول
      document.getElementById('newWord').value = '';
      document.getElementById('wordImage').value = '';
      document.getElementById('wordDesc').value = '';
      document.getElementById('previewArea').style.display = 'none';
      displayWordList();
      
    } catch(e) {
      showError('حدث خطأ في الحفظ: ' + e.message);
    }
  }

  function downloadJSON(content, filename) {
    const blob = new Blob([content], { type: 'application/json' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
    URL.revokeObjectURL(link.href);
  }

  function showSuccess(msg, timeout = 3000) {
    const el = document.getElementById('successMsg');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, timeout);
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 3000);
  }

  loadWords();
</script>
</body>
</html>
